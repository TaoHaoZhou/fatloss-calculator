// в”Җв”Җ е…ЁеұҖзҠ¶жҖҒ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
var P={gender:"male",activity:1.55,weight:70,height:170,age:25,deficit:500},
    currentDate=todayStr(),allData={},activeFilter="е…ЁйғЁ",chartType="weight";

// в”Җв”Җ е·Ҙе…·еҮҪж•° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function todayStr(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function pad(n){return n<10?"0"+n:n;}
function kcal(c,p,f){return Math.round(c*4+p*4+f*9);}
function wkday(ds){return["е‘Ёж—Ҙ","е‘ЁдёҖ","е‘ЁдәҢ","е‘Ёдёү","е‘Ёеӣӣ","е‘Ёдә”","е‘Ёе…ӯ"][new Date(ds+"T00:00:00").getDay()];}
function fmtDate(ds){var d=new Date(ds+"T00:00:00");return(d.getMonth()+1)+"жңҲ"+d.getDate()+"ж—Ҙ";}
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},1800);}

// в”Җв”Җ и®Ўз®— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function BMR(){return P.gender==="male"?10*P.weight+6.25*P.height-5*P.age+5:10*P.weight+6.25*P.height-5*P.age-161;}
function TDEE(b){return Math.round(b*P.activity);}
function TARGET(t){return t-P.deficit;}
function REC(){var w=P.weight;return{c:Math.round(w*2),p:Math.round(w*2),f:Math.round(w*0.8)};} // дҝ®жӯЈпјҡиӣӢзҷҪ2gзўіж°ҙ2gи„ӮиӮӘ0.8g

function recalc(){
  var B=BMR(),T=TDEE(B),G=TARGET(T),R=REC();
  var d=getData();
  var ec=0,ep=0,ef=0;
  for(var i=0;i<d.foods.length;i++){ec+=d.foods[i].c;ep+=d.foods[i].p;ef+=d.foods[i].f;}
  var cal=kcal(ec,ep,ef),calRem=G-cal;
  document.getElementById("bmrVal").textContent=Math.round(B);
  document.getElementById("targetVal").textContent=G;
  document.getElementById("calRem").textContent=calRem+(calRem>=0?"":"");
  document.getElementById("calRem").style.color=calRem>=0?"#3dd68c":"#ff6b6b";
  setM("c",ec,R.c);setM("p",ep,R.p);setM("f",ef,R.f);
  document.getElementById("foodCount").textContent=d.foods.length;
  document.getElementById("foodCal").textContent=cal;
  renderFoods();renderDaySummary(cal,G,ec,ep,ef,R);
}

function setM(type,eaten,total){
  var pct=total>0?Math.min(eaten/total*100,100):0;
  var rem=total-eaten;
  document.getElementById(type+"Eat").textContent=eaten.toFixed(0);
  document.getElementById(type+"Tot").textContent=total;
  document.getElementById(type+"Bar").style.width=pct+"%";
}

// в”Җв”Җ ж•°жҚ®еӯҳеҸ– в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function getData(){if(!allData[currentDate])allData[currentDate]={foods:[],weight:null};return allData[currentDate];}
function saveAllData(){localStorage.setItem("lipidAllData2",JSON.stringify(allData));}
function loadAllData(){var s=localStorage.getItem("lipidAllData2");if(s){try{allData=JSON.parse(s);}catch(e){}}}
function saveProfile(){
  P.gender=document.getElementById("gender").value;
  P.activity=parseFloat(document.getElementById("activity").value);
  P.weight=parseFloat(document.getElementById("weight").value)||70;
  P.height=parseFloat(document.getElementById("height").value)||170;
  P.age=parseFloat(document.getElementById("age").value)||25;
  P.deficit=parseFloat(document.getElementById("deficit").value)||500;
  localStorage.setItem("lipidProfile2",JSON.stringify(P));recalc();toast("и®ҫзҪ®е·Ідҝқеӯҳ");
}
function loadProfile(){
  var s=localStorage.getItem("lipidProfile2");
  if(s){try{Object.assign(P,JSON.parse(s));}catch(e){}}
  document.getElementById("gender").value=P.gender;
  document.getElementById("activity").value=P.activity;
  document.getElementById("weight").value=P.weight||"";
  document.getElementById("height").value=P.height||"";
  document.getElementById("age").value=P.age||"";
  document.getElementById("deficit").value=P.deficit||"";
}

// в”Җв”Җ дҪ“йҮҚ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function saveWeight(){
  var v=parseFloat(document.getElementById("fastedWeight").value);
  if(!v||v<=0){toast("иҜ·иҫ“е…Ҙжңүж•ҲдҪ“йҮҚ");return;}
  getData().weight=v;saveAllData();recalc();
  toast("дҪ“йҮҚе·Іи®°еҪ•: "+v+"kg");
}
function getWtDelta(){
  var d=getData();
  if(!d.weight)return"";
  var dates=Object.keys(allData).sort().reverse();
  for(var i=0;i<dates.length;i++){
    if(dates[i]<currentDate&&allData[dates[i]].weight){
      var diff=(d.weight-allData[dates[i]].weight).toFixed(1);
      var sign=diff<0?"вҶ“":diff>0?"вҶ‘":"вҶ’";
      var color=diff<0?"#3dd68c":diff>0?"#ff6b6b":"#888";
      return'<span style="color:'+color+'">'+sign+Math.abs(diff)+'kg</span>';
    }
  }
  return'<span style="color:#888">йҰ–ж—Ҙи®°</span>';
}

// в”Җв”Җ йЈҹзү©ж“ҚдҪң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function addFood(name,weight){
  if(!name||!weight||weight<=0)return;
  var src=DB[name];if(!src)return;
  var factor=weight/100;
  getData().foods.push({name:name,weight:weight,c:src.c*factor,p:src.p*factor,f:src.f*factor});
  saveAllData();recalc();
}
function removeFood(idx){getData().foods.splice(idx,1);saveAllData();recalc();}
function clearAll(){if(!confirm("жё…з©әд»Ҡж—ҘжүҖжңүи®°еҪ•пјҹ"))return;getData().foods=[];getData().weight=null;saveAllData();recalc();toast("е·Іжё…з©ә");}

// в”Җв”Җ жёІжҹ“йЈҹзү©еҲ—иЎЁ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderFoods(){
  var list=document.getElementById("foodList"),foods=getData().foods;
  if(foods.length===0){list.innerHTML='<div class="empty">иҝҳжІЎжңүи®°еҪ•пјҢдёҠж–№жҗңзҙўж·»еҠ </div>';return;}
  var html="";
  for(var i=0;i<foods.length;i++){
    var f=foods[i];
    html+='<div class="food-item">'+
      '<div class="food-left">'+
        '<div class="food-name">'+f.name+'</div>'+
        '<div class="food-meta"><span class="c">зўі'+f.c.toFixed(1)}g</span> <span class="p">иӣӢзҷҪ'+f.p.toFixed(1)}g</span> <span class="f">и„Ӯ'+f.f.toFixed(1)}g</span> '+kcal(f.c,f.p,f.f)+'kcal</div>'+
      '</div>'+
      '<div class="food-right">'+
        '<div class="wt-adjust"><button class="adj-btn" onclick="adjWt('+i+',-10)">-</button>'+
        '<input type="number" value="'+f.weight+'" min="1" onchange="adjWtDirect('+i+',this.value)">'+
        '<button class="adj-btn" onclick="adjWt('+i+',10)">+</button></div>'+
        '<div class="food-kcal">'+kcal(f.c,f.p,f.f)+'</div>'+
        '<button class="del-btn" onclick="removeFood('+i+')">вң•</button>'+
      '</div>'+
    '</div>';
  }
  list.innerHTML=html;
}
function adjWt(i,delta){
  var f=getData().foods[i];
  var newWt=Math.max(1,f.weight+delta);
  var factor=newWt/f.weight;
  f.c*=factor;f.p*=factor;f.f*=factor;f.weight=newWt;
  saveAllData();recalc();
}
function adjWtDirect(i,val){
  var newWt=Math.max(1,parseFloat(val)||1);
  var f=getData().foods[i];
  var factor=newWt/f.weight;
  f.c*=factor;f.p*=factor;f.f*=factor;f.weight=newWt;
  saveAllData();recalc();
}

// в”Җв”Җ жҜҸж—ҘжҖ»з»“ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

// в”Җв”Җ жҗңзҙўеҠҹиғҪ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildFilters(){
  var cats=["е…ЁйғЁ","дё»йЈҹ","иӮүзұ»","и”¬иҸң","ж°ҙжһң","еҘ¶зұ»","еқҡжһң","зӮ’иҸң","еҝ«йӨҗ","е…¶д»–"];
  var wrap=document.getElementById("filterTags");
  wrap.innerHTML="";
  cats.forEach(function(cat){
    var el=document.createElement("div");
    el.className="filter-tag"+(cat==="е…ЁйғЁ"?" active":"");
    el.textContent=cat;
    el.onclick=function(){
      document.querySelectorAll(".filter-tag").forEach(function(e){e.classList.remove("active");});
      el.classList.add("active");activeFilter=cat;
      var q=document.getElementById("foodSearch").value;
      if(q)doSearch(q);else closeSearch();
    };
    wrap.appendChild(el);
  });
}

function doSearch(q){
  var results=document.getElementById("searchResults");
  if(!q||q.length===0){closeSearch();return;}
  document.getElementById("searchClear").classList.add("show");
  var qLower=q.toLowerCase().trim();
  var matches=[];
  Object.keys(DB).forEach(function(name){
    var item=DB[name];
    if(activeFilter!=="е…ЁйғЁ"&&item.cat!==activeFilter)return;
    var score=0;
    if(name===qLower)score=100;
    else if(name.indexOf(qLower)===0)score=80;
    else if(name.indexOf(qLower)>0)score=50;
    else if(item.tags&&item.tags.indexOf(qLower)>=0)score=40;
    else {
      // жӢјйҹійҰ–еӯ—жҜҚеҢ№й…ҚпјҲз®ҖеҚ•пјү
      var pinyinMap={"zh":"дёӯ","ch":"еҗғ","r":"иӮү","j":"йёЎ","c":"иҸң","t":"зўі","dan":"иӣӢ","yu":"йұј","lu":"з»ҝ","hong":"зәў","bai":"зҷҪ","hei":"й»‘","la":"иҫЈ","suan":"й…ё","ti":"дҪ“","jian":"еҮҸ","fei":"иӮҘ","shou":"зҳҰ","biao":"ж Ү","bia":"ж Ү"};
      // йҖҖиҖҢжұӮе…¶ж¬Ўпјҡе®ҪжқҫеҢ…еҗ«еҢ№й…Қ
      var combined=(name+item.tags+qLower).toLowerCase();
      if(combined.indexOf(qLower)>=0)score=20;
    }
    if(score>0)matches.push({name:name,item:item,score:score});
  });
  matches.sort(function(a,b){return b.score-a.score;});
  matches=matches.slice(0,15);
  if(matches.length===0){results.innerHTML='<div class="search-no">жІЎжңүжүҫеҲ°"'+q+'"<br><span style="font-size:11px;color:#444">иҜ•иҜ•е…¶д»–е…ій”®иҜҚ</span></div>';results.classList.add("open");return;}
  var html="";
  matches.forEach(function(m){
    var item=m.item;
    var cal=kcal(item.c,item.p,item.f);
    var nameHtml='<span class="sr-name">'+highlight(m.name,q)+'</span>';
    var tagsHtml='<div class="sr-meta"><span class="sr-tag">'+item.cat+'</span></div>';
    html+='<div class="search-result-item" onclick="pickFood(\\''+m.name.replace(/'/g,"\\'")+'\\')">'+
      '<div class="sr-left">'+nameHtml+tagsHtml+'</div>'+
      '<div class="sr-right"><div class="sr-kcal">'+cal+'</div><div class="sr-unit">kcal/100g</div></div>'+
    '</div>';
  });
  results.innerHTML=html;results.classList.add("open");
}

function highlight(text,q){
  if(!q)return text;
  var idx=text.toLowerCase().indexOf(q.toLowerCase());
  if(idx<0)return text;
  return text.slice(0,idx)+'<span class="hl">'+text.slice(idx,idx+q.length)+'</span>'+text.slice(idx+q.length);
}

function closeSearch(){
  document.getElementById("searchResults").classList.remove("open");
  document.getElementById("searchClear").classList.remove("show");
}

function clearSearch(){
  document.getElementById("foodSearch").value="";
  closeSearch();
  document.getElementById("foodSearch").focus();
}

function pickFood(name){
  addFood(name,100);
  clearSearch();
  toast("е·Іж·»еҠ : "+name);
  closeSearch();
}

  document.getElementById("tabStats").classList.toggle("active",tab==="stats");

function changeDate(delta){
  var d=new Date(currentDate+"T00:00:00");d.setDate(d.getDate()+delta);
  currentDate=d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
  document.getElementById("datePick")&&(document.getElementById("datePick").value=currentDate);
  loadDate();recalc();updateHistDayInfo();
}
function onDateChange(){currentDate=document.getElementById("datePick").value;loadDate();recalc();updateHistDayInfo();}
function goToday(){currentDate=todayStr();document.getElementById("datePick")&&(document.getElementById("datePick").value=currentDate);loadDate();recalc();updateHistDayInfo();}
function loadDate(){if(!allData[currentDate])allData[currentDate]={foods:[],weight:null};}
function updateHistDayInfo(){
  var R=REC(),B=BMR(),T=TDEE(B),G=TARGET(T),d=getData();
  var ec=0,ep=0,ef=0;
  for(var i=0;i<d.foods.length;i++){ec+=d.foods[i].c;ep+=d.foods[i].p;ef+=d.foods[i].f;}
  var cal=kcal(ec,ep,ef);
  var el=document.getElementById("histDayInfo");
  if(d.foods.length===0&&!d.weight){el.innerHTML='<div class="empty">иҜҘж—Ҙж— и®°еҪ•</div>';return;}
  var html='<div class="history-card" style="cursor:default">';
  if(d.weight)html+='<div class="history-top"><span class="history-date">дҪ“йҮҚ</span><span class="history-wt">'+d.weight+'kg</span></div>';
  if(d.foods.length>0){
    var calDiff=cal-G;
    html+='<div class="history-cal '+(calDiff<=0?'ok':'over')+'">'+cal+'kcal '+(calDiff<=0?'иҫҫж Ү':'и¶…ж Ү'+Math.abs(calDiff))+'</div>';
    html+='<div class="chips"><span class="chip '+(ec<=R.c?'ok':'over')+'">зўі'+(ec-R.c>=0?'+':'')+(ec-R.c).toFixed(0)+'g</span><span class="chip '+(ep<=R.p?'ok':'over')+'">иӣӢзҷҪ'+(ep-R.p>=0?'+':'')+(ep-R.p).toFixed(0)+'g</span></div>';
  }
  html+='</div>';
  el.innerHTML=html;
  document.getElementById("dateTitle").textContent=fmtDate(currentDate)+" "+wkday(currentDate);
}
function jumpToDate(ds){currentDate=ds;document.getElementById("datePick")&&(document.getElementById("datePick").value=currentDate);loadDate();recalc();updateHistDayInfo();switchTab("calc");}
function renderHistory(){
  var list=document.getElementById("historyList");

  if(dates.length===0){list.innerHTML='<div class="empty">жҡӮж— еҺҶеҸІи®°еҪ•</div>';return;}
  var R=REC(),B=BMR(),T=TDEE(B),G=TARGET(T);
  var html="";
  for(var j=0;j<Math.min(dates.length,60);j++){
    var ds=dates[j];var d=allData[ds];

    for(var i=0;i<d.foods.length;i++){ec+=d.foods[i].c;ep+=d.foods[i].p;ef+=d.foods[i].f;}
    var cal=kcal(ec,ep,ef),calDiff=cal-G;
    var foodNames=d.foods.length>0?d.foods.map(function(f){return f.name+"Г—"+f.weight+"g";}).join("гҖҒ"):"ж— и®°еҪ•";
    html+='<div class="history-card" onclick="jumpToDate(\\''+ds+'\\')">'+
      '<div class="history-top"><span class="history-date">'+fmtDate(ds)+' '+wkday(ds)+'</span>'+(d.weight?'<span class="history-wt">'+d.weight+'kg</span>':'')+'</div>'+
      '<div class="history-cal '+(calDiff<=0?'ok':'over')+'">'+cal+'kcal '+(calDiff<=0?'иҫҫж Ү':'и¶…ж Ү'+Math.abs(calDiff))+'</div>'+
      '<div class="chips"><span class="chip '+(ec<=R.c?'ok':'over')+'">зўі'+(ec-R.c>=0?'+':'')+c2(ec-R.c)+'g</span><span class="chip '+(ep<=R.p?'ok':'over')+'">иӣӢзҷҪ'+(ep-R.p>=0?'+':'')+c2(ep-R.p)+'g</span></div>'+
      '<div class="history-foods">'+foodNames+'</div>'+
    '</div>';

  list.innerHTML=html;

function c2(n){return(n>=0?"+":"")+n.toFixed(0);}

// в”Җв”Җ и¶ӢеҠҝеӣҫиЎЁ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showChart(type){
  chartType=type;
  document.getElementById("chartBtnWt").classList.toggle("active",type==="weight");
  document.getElementById("chartBtnCal").classList.toggle("active",type==="cal");
  document.getElementById("chartBtnMacro").classList.toggle("active",type==="macro");
  var dates=Object.keys(allData).filter(function(d){return d<=todayStr();}).sort();
  var R=REC(),B=BMR(),T=TDEE(B),G=TARGET(T);
  var canvas=document.getElementById("trendCanvas");
  var ctx=canvas.getContext("2d");
  var W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(dates.length<2){ctx.fillStyle="#444";ctx.font="13px sans-serif";ctx.textAlign="center";ctx.fillText("и®°еҪ•иҮіе°‘2еӨ©ж•°жҚ®еҗҺжҳҫзӨәи¶ӢеҠҝ",W/2,H/2+5);document.getElementById("chartSummary").textContent="";return;}
  var pts=[];
  if(type==="weight"){
    dates.forEach(function(d){if(allData[d].weight)pts.push({x:d,y:allData[d].weight});});
  } else if(type==="cal"){
    dates.forEach(function(d){
      var ec=0,ep=0,ef=0;
      for(var i=0;i<allData[d].foods.length;i++){ec+=allData[d].foods[i].c;ep+=allData[d].foods[i].p;ef+=allData[d].foods[i].f;}
      pts.push({x:d,y:kcal(ec,ep,ef)});
    });
  } else {
    dates.forEach(function(d){
      var ep=0;
      for(var i=0;i<allData[d].foods.length;i++)ep+=allData[d].foods[i].p;
      pts.push({x:d,y:ep});
    });
  }
  if(pts.length<2){ctx.fillStyle="#444";ctx.font="13px sans-serif";ctx.textAlign="center";ctx.fillText("ж•°жҚ®дёҚи¶і",W/2,H/2+5);document.getElementById("chartSummary").textContent="";return;}
  var vals=pts.map(function(p){return p.y;});
  var minV=Math.min.apply(null,vals);
  var maxV=Math.max.apply(null,vals);
  var padV=(maxV-minV)*0.15||10;
  var chartMin=type==="weight"?minV-padV:0;
  var chartMax=maxV+padV;
  var drawH=H-30,drawW=W-20;
  // зӣ®ж ҮзәҝпјҲзғӯйҮҸпјү
  if(type==="cal"){
    ctx.strokeStyle="#ffd93d";ctx.setLineDash=[4,4];ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(10,mapY(G,chartMin,chartMax,drawH));ctx.lineTo(W-10,mapY(G,chartMin,chartMax,drawH));ctx.stroke();
    ctx.setLineDash=[];
  }
  // жҠҳзәҝ
  ctx.strokeStyle="#3dd68c";ctx.lineWidth=2;ctx.beginPath();
  pts.forEach(function(p,i){
    var x=10+i*(drawW/(pts.length-1));
    var y=mapY(p.y,chartMin,chartMax,drawH);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
  // зӮ№
  ctx.fillStyle="#3dd68c";
  pts.forEach(function(p,i){
    var x=10+i*(drawW/(pts.length-1));
    var y=mapY(p.y,chartMin,chartMax,drawH);
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
  });
  // еә•йғЁж Үзӯҫ
  ctx.fillStyle="#555";ctx.font="9px sans-serif";ctx.textAlign="center";
  var step=Math.max(1,Math.floor(pts.length/5));
  pts.forEach(function(p,i){
    if(i%step===0||i===pts.length-1){
      var x=10+i*(drawW/(pts.length-1));
      var ds=p.x.split("-");ctx.fillText(parseInt(ds[1])+"/"+parseInt(ds[2]),x,H-8);
    }
  });
  // жұҮжҖ»
  var avg=vals.reduce(function(a,b){return a+b;},0)/vals.length;
  var unit=type==="weight"?"kg":type==="cal"?"kcal":"g";
  document.getElementById("chartSummary").innerHTML=
    "е…ұ "+pts.length+" еӨ© | еқҮеҖј <b style='color:#e8e8f0'>"+avg.toFixed(1)+unit+"</b> | жңҖй«ҳ <b style='color:#ff6b6b'>"+maxV.toFixed(1)+unit+"</b> | жңҖдҪҺ <b style='color:#6bcfff'>"+minV.toFixed(1)+unit+"</b>";
}
function mapY(v,min,max,h){return h-(v-min)/(max-min)*h;}

// в”Җв”Җ е‘ЁжҠҘ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderWeekReport(){
  var dates=Object.keys(allData).filter(function(d){return d<=todayStr();}).sort().reverse().slice(0,7).reverse();
  var R=REC(),B=BMR(),T=TDEE(B),G=TARGET(T);
  var el=document.getElementById("weekReport");
  if(dates.length===0){el.innerHTML='<div class="empty">жң¬е‘ЁжҡӮж— ж•°жҚ®</div>';return;}
  var days=[],totalCal=0,totalDays=0,avgProtein=0,weightStart=null,weightEnd=null;
  dates.forEach(function(ds){
    var d=allData[ds];
    if(!d.weight&&d.foods.length===0)return;
    var ec=0,ep=0,ef=0;
    for(var i=0;i<d.foods.length;i++){ec+=d.foods[i].c;ep+=d.foods[i].p;ef+=d.foods[i].f;}
    var cal=kcal(ec,ep,ef);
    days.push({date:ds,cal:cal,protein:ep,weight:d.weight,over:cal>G});
    totalCal+=cal;totalDays++;avgProtein+=ep;
    if(d.weight){weightEnd=d.weight;if(!weightStart)weightStart=d.weight;}
  });
  if(days.length===0){el.innerHTML='<div class="empty">жң¬е‘ЁжҡӮж— ж•°жҚ®</div>';return;}
  var avgCal=totalCal/totalDays;
  avgProtein=avgProtein/totalDays;
  var overDays=days.filter(function(d){return d.over;}).length;
  var html="";
  days.forEach(function(d){
    var calDiff=d.cal-G;
    html+='<div class="wreport-item">'+
      '<span class="wr-key">'+fmtDate(d.date)+' '+wkday(d.date)+'</span>'+
      '<span class="wr-val" style="color:'+(d.cal<=G?'#3dd68c':'#ff6b6b')+'">'+d.cal+'kcal</span>'+
    '</div>';
  });
  html+='<div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">'+
    '<div class="wstat"><div class="ws-label">ж—ҘеқҮзғӯйҮҸ</div><div class="ws-val '+(avgCal<=G?'green':'red')+'">'+Math.round(avgCal)+'</div></div>'+
    '<div class="wstat"><div class="ws-label">ж—ҘеқҮиӣӢзҷҪ</div><div class="ws-val green">'+avgProtein.toFixed(0)+'g</div></div>'+
    '<div class="wstat"><div class="ws-label">и¶…ж ҮеӨ©ж•°</div><div class="ws-val '+(overDays===0?'green':'red')+'">'+overDays+'/'+days.length+'</div></div>'+
  '</div>';
  el.innerHTML=html;
}

// в”Җв”Җ ж•°жҚ®еҜје…ҘеҜјеҮә в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function exportData(){
  var blob=new Blob([JSON.stringify({profile:P,data:allData},null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="fatloss-backup-"+todayStr()+".json";a.click();
  toast("е·ІеҜјеҮәJSONеӨҮд»Ҫ");
}
function exportCSV(){
  var R=REC(),B=BMR(),T=TDEE(B),G=TARGET(T);
  var rows=[["ж—Ҙжңҹ","дҪ“йҮҚ","зғӯйҮҸ","зўіж°ҙ","иӣӢзҷҪ","и„ӮиӮӘ","и¶…ж Ү?"]];
  Object.keys(allData).sort().forEach(function(ds){
    var d=allData[ds];
    var ec=0,ep=0,ef=0;
    for(var i=0;i<d.foods.length;i++){ec+=d.foods[i].c;ep+=d.foods[i].p;ef+=d.foods[i].f;}
    rows.push([ds,d.weight||"",kcal(ec,ep,ef),ec.toFixed(1),ep.toFixed(1),ef.toFixed(1),kcal(ec,ep,ef)>G?"жҳҜ":"еҗҰ"]);
  });
  var csv=rows.map(function(r){return r.join(",");}).join("\n");
  var blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="fatloss-history-"+todayStr()+".csv";a.click();
  toast("е·ІеҜјеҮәCSV");
}
function importData(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var obj=JSON.parse(ev.target.result);
      if(obj.profile)Object.assign(P,obj.profile);
      if(obj.data)allData=obj.data;
      localStorage.setItem("lipidProfile2",JSON.stringify(P));
      localStorage.setItem("lipidAllData2",JSON.stringify(allData));
      loadProfile();recalc();
      toast("еҜје…ҘжҲҗеҠҹпјҒ");
    }catch(e){toast("еҜје…ҘеӨұиҙҘпјҢж–Үд»¶ж јејҸй”ҷиҜҜ");}
  };
  reader.readAsText(file);
}
function resetAll(){
  if(!confirm("зЎ®е®ҡеҲ йҷӨжүҖжңүж•°жҚ®пјҹжӯӨж“ҚдҪңдёҚеҸҜжҒўеӨҚпјҒ"))return;
  localStorage.removeItem("lipidProfile2");
  localStorage.removeItem("lipidAllData2");
  allData={};P={gender:"male",activity:1.55,weight:70,height:170,age:25,deficit:500};
  loadProfile();recalc();
  toast("жүҖжңүж•°жҚ®е·ІеҲ йҷӨ");
}
